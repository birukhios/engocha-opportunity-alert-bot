name: Opportunity Alert

on:
  schedule:
    # 8:13 AM, 1:13 PM, and 6:13 PM Africa/Addis_Ababa.
    # Africa/Addis_Ababa is UTC+3, so these run at 5:13, 10:13, and 15:13 UTC.
    - cron: "13 5,10,15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    concurrency:
      group: opportunity-alert-main
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run opportunity alert bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELIEFWEB_APP_NAME: ${{ secrets.RELIEFWEB_APP_NAME }}
        run: python src/main.py

      - name: Commit updated opportunity data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json data/opportunities.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update opportunity alert data"
            git pull --rebase origin main
            git push
          fi
