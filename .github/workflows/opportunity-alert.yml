name: Opportunity Alert

on:
  schedule:
    # 8:13 AM, 1:13 PM, and 6:13 PM Africa/Addis_Ababa.
    # Africa/Addis_Ababa is UTC+3, so these run at 5:13, 10:13, and 15:13 UTC.
    - cron: "13 5,10,15 * * *"
  workflow_dispatch:
    inputs:
      test_telegram:
        description: "Send only a short Telegram test message"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ignore_seen:
        description: "Ignore seen.json and resend top matches for testing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      send_summary:
        description: "Send a Telegram run summary"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    concurrency:
      group: opportunity-alert-main
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run opportunity alert bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELIEFWEB_APP_NAME: ${{ secrets.RELIEFWEB_APP_NAME }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --send-summary"
          fi
          if [ "${{ github.event.inputs.test_telegram }}" = "true" ]; then
            ARGS="$ARGS --test-telegram"
          fi
          if [ "${{ github.event.inputs.ignore_seen }}" = "true" ]; then
            ARGS="$ARGS --ignore-seen"
          fi
          if [ "${{ github.event.inputs.send_summary }}" = "true" ]; then
            ARGS="$ARGS --send-summary"
          fi
          python src/main.py $ARGS

      - name: Commit updated opportunity data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json data/opportunities.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update opportunity alert data"
            git pull --rebase origin main
            git push
          fi
